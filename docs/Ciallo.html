<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciallo Party</title>
<style>
  body {
    background-color: #f0f0f0;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .ciallo {
    position: absolute;
    font-size: 24px;
    font-family: 'Arial', sans-serif;
    animation: float 5s infinite linear;
  }
  @keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100px); }
  }
</style>
</head>
<body>
<script>
  const colors = ['#ff69b4', '#6495ed', '#32cd32', '#ffd700', '#ff8c00', '#8a2be2'];
  const ciallos = [];

  for (let i = 0; i < 50; i++) {
    const ciallo = document.createElement('div');
    ciallo.classList.add('ciallo');
    ciallo.textContent = 'Ciallo～(∠・ω< )⌒☆';
    ciallo.style.color = colors[i % colors.length];
    ciallo.style.left = `${Math.random() * 100}vw`;
    ciallo.style.top = `${Math.random() * 100}vh`;
    ciallo.style.animationDuration = `${Math.random() * 5 + 3}s`;
    ciallo.style.animationDelay = `${Math.random() * 5}s`;
    document.body.appendChild(ciallo);
    ciallos.push(ciallo);
  }
</script>
</body>
</html>
