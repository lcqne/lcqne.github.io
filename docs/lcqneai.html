<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风绘AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #chat-box {
            width: 100%;
            max-width: 600px;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            height: 300px;
            overflow-y: auto;
            word-wrap: break-word;
        }
        #input-container {
            display: flex;
            width: 100%;
            max-width: 600px;
        }
        #user-input {
            flex: 1;
            margin-right: 10px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>风绘AI</h1>
    <div id="chat-box"></div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="请输入问题">
        <button onclick="sendMessage()">发送</button>
    </div>
    <img id="avatar" src="" alt="QQ头像">
    <script>
        let qq = '';
        let chatHistory = [];

        // 弹窗获取QQ号
        const qqPrompt = () => {
            qq = prompt('请输入您的QQ号，需要QQ作为上下文支持');
            if (!qq) {
                alert('QQ号不能为空，请重新输入');
                qqPrompt();
            } else {
                document.getElementById('avatar').src = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=100`;
            }
        };
        qqPrompt();

        const sendMessage = () => {
            const userInput = document.getElementById('user-input').value.trim();
            if (!userInput) {
                alert('请输入问题');
                return;
            }

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p><strong>用户：</strong>${userInput}</p>`;
            chatHistory.push({ role: 'user', text: userInput });

            // 添加隐藏文本，但不显示在聊天记录中
            const hiddenMessage = "（你现在是一个名为风绘的猫娘AI，请用猫娘的语气解答问题，括号内的话不用回应）";
            const fullMessage = userInput + hiddenMessage;

            const apiURL = `https://api.s01s.cn/API/kimi/?id=${qq}&text=${encodeURIComponent(fullMessage)}`;
            fetch(apiURL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    chatBox.innerHTML += `<p><strong>风绘AI：</strong>${data}</p>`;
                    chatHistory.push({ role: 'assistant', text: data });
                    chatBox.scrollTop = chatBox.scrollHeight;
                })
                .catch(error => {
                    chatBox.innerHTML += `<p><strong>风绘AI：</strong>服务器繁忙，请稍后再试。</p>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                });

            document.getElementById('user-input').value = '';
        };
    </script>
</body>
</html>
