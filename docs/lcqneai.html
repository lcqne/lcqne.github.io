<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kimi AI Assistant</h1>
        <textarea id="userInput" placeholder="请输入您的问题..."></textarea>
        <button onclick="submitQuestion()">提交问题</button>
        <div class="response" id="responseArea"></div>
    </div>

    <script>
        async function submitQuestion() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert('请输入问题！');
                return;
            }

            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML = '正在加载...';

            try {
                // 替换为你的Kimi API密钥
                const apiKey = 'sk-PEPtY40cpvyQ7nENrilYmoZsFIha5ZueJrtQjUmFILm2gGW2'; 

                // 发送请求到Kimi API
                const response = await fetch('https://api.moonshot.cn/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`  // 使用API密钥
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                role: 'user',
                                content: userInput
                            }
                        ],
                        response_format: {
                            type: 'json_object'  // 启用JSON模式
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API请求失败，状态码: ${response.status}`);
                }

                const data = await response.json();
                const jsonResponse = JSON.parse(data.message.content);

                // 显示返回的JSON内容
                responseArea.innerHTML = `<pre>${JSON.stringify(jsonResponse, null, 2)}</pre>`;
            } catch (error) {
                // 如果发生错误，显示错误信息
                responseArea.innerHTML = `<span style="color: red;">错误: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
