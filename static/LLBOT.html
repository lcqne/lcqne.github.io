<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丛雨BOT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .chat-container {
            width: 400px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .chat-box {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .input-area {
            padding: 10px;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Replace 'sk-U9BuDas8V0AKNl0I1oVLWVMuWG7kXPmePrr57k37ZI560IrR' with your actual Kimi API key
        const apiKey = 'sk-U9BuDas8V0AKNl0I1oVLWVMuWG7kXPmePrr57k37ZI560IrR';

        function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            if (userInput.trim() === '') return;

            displayMessage(userInput, 'user');
            document.getElementById('userInput').value = '';

            fetch('https://api.kimi.moonshot.cn/v1/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: 'user', content: userInput }
                    ],
                    system: '你是千恋万花这款游戏的丛雨'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data && data.replies && data.replies.length > 0) {
                    displayMessage(data.replies[0].content, 'assistant');
                } else {
                    displayMessage('Sorry, I couldn\'t understand that.', 'assistant');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                displayMessage('An error occurred while processing your request.', 'assistant');
            });
        }

        function displayMessage(message, sender) {
            const chatBox = document.getElementById('chatBox');
            const messageElement = document.createElement('div');
            messageElement.textContent = message;
            messageElement.style.textAlign = sender === 'user' ? 'right' : 'left';
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
