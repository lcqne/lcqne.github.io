<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat with Context</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #chat-box {
            width: 100%;
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        #chat-box textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        #chat-box button {
            padding: 5px 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #chat-box button:hover {
            background-color: #0056b3;
        }
        #chat-history {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            height: 200px;
            overflow-y: scroll;
        }
    </style>
</head>
<body>
    <div id="chat-box">
        <textarea id="input-text" placeholder="请输入您的问题..."></textarea>
        <button id="send-button">发送</button>
    </div>
    <div id="chat-history">
        <p>聊天记录：</p>
    </div>

    <script>
        // 获取用户输入的QQ号码
        let qq = prompt("请输入您的QQ号码：");
        if (!qq) {
            alert("未输入QQ号码，无法使用聊天功能！");
            document.getElementById("send-button").disabled = true;
        }

        document.getElementById("send-button").addEventListener("click", function() {
            let inputText = document.getElementById("input-text").value.trim();
            if (!inputText) {
                alert("请输入问题！");
                return;
            }

            // 构造请求URL
            let apiUrl = `https://api.s01s.cn/API/kimi/?id=${qq}&text=${encodeURIComponent(inputText)}`;

            // 发送请求
            fetch(apiUrl)
                .then(response => response.text())
                .then(data => {
                    // 显示结果
                    let chatHistory = document.getElementById("chat-history");
                    chatHistory.innerHTML += `<p><strong>用户：</strong>${inputText}</p>`;
                    chatHistory.innerHTML += `<p><strong>AI：</strong>${data}</p>`;
                    document.getElementById("input-text").value = ""; // 清空输入框
                })
                .catch(error => {
                    console.error("请求失败：", error);
                    alert("请求失败，请稍后重试！");
                });
        });
    </script>
</body>
</html>
