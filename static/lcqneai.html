<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeekAI问答</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
        }
        #response {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        #loading {
            display: none;
            margin-top: 10px;
        }
    </style>
    <script>
        function sendRequest() {
            const userMessage = document.getElementById('userMessage').value;
            const data = {
                messages: [
                    { "role": "system", "content": "You are a helpful assistant." },
                    { "role": "user", "content": userMessage }
                ]
            };

            document.getElementById('loading').style.display = 'block';
            document.getElementById('response').textContent = '';

            fetch('https://api.pearktrue.cn/api/deepseek/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('response').textContent = data.message;
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                document.getElementById('response').textContent = '请求失败：' + error.message;
                document.getElementById('loading').style.display = 'none';
            });
        }
    </script>
</head>
<body>
    <h1>DeepSeekAI问答</h1>
    <textarea id="userMessage" placeholder="输入你的问题..."></textarea><br>
    <button onclick="sendRequest()">发送</button>
    <div id="loading">加载中...</div>
    <h2>AI的回答：</h2>
    <p id="response"></p>
</body>
</html>
