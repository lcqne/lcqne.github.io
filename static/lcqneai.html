<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风绘AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            height: 300px;
            overflow-y: scroll;
        }
        #user-input {
            width: calc(100% - 110px);
        }
        #avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <h1>风绘AI</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="请输入问题">
    <button onclick="sendMessage()">发送</button>
    <button onclick="resetSession()">重置会话</button>
    <img id="avatar" src="" alt="QQ头像">
    <script>
        let qq = '';
        let chatHistory = [];

        // 弹窗获取QQ号
        const qqPrompt = () => {
            qq = prompt('请输入您的QQ号');
            if (!qq) {
                alert('QQ号不能为空，请重新输入');
                qqPrompt();
            } else {
                document.getElementById('avatar').src = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=100`;
            }
        };
        qqPrompt();

        const sendMessage = () => {
            const userInput = document.getElementById('user-input').value;
            if (!userInput) {
                alert('请输入问题');
                return;
            }
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p><strong>用户：</strong>${userInput}</p>`;
            chatHistory.push({ role: 'user', text: userInput });

            const apiURL = `https://api.s01s.cn/API/kimi/?id=${qq}&text=${encodeURIComponent(userInput)}`;
            fetch(apiURL)
                .then(response => response.text())
                .then(data => {
                    chatBox.innerHTML += `<p><strong>风绘AI：</strong>${data}</p>`;
                    chatHistory.push({ role: 'assistant', text: data });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
            document.getElementById('user-input').value = '';
        };

        const resetSession = () => {
            const resetURL = `https://api.s01s.cn/API/kimi/?id=${qq}&text=重置会话&type=2`;
            fetch(resetURL)
                .then(() => {
                    chatHistory = [];
                    document.getElementById('chat-box').innerHTML = '';
                    alert('会话已重置');
                });
        };
    </script>
</body>
</html>
